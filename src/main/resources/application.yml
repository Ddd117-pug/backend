server:
  port: 8080

spring:
  application:
    name: toy-collector-shop
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  datasource:
    url: jdbc:mysql://localhost:3306/toy_shop?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  mail:
    host: smtp.qq.com
    port: 465
    username: your_email@example.com
    password: your_mail_auth_code
    protocol: smtp
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true

toyshop:
  mail:
    from: your_email@example.com
  reset-password:
    expire-seconds: 300
    cooldown-seconds: 60

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

logging:
  level:
    com.toyshop: debug

jwt:
  # 至少 32 字符（HS256）
  secret: "toyshop_jwt_secret_change_me_32_chars_min"
  # 过期时间（毫秒）：默认 7 天
  expire-ms: 604800000
